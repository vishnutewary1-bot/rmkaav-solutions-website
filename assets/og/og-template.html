<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>RMKAAV OG</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; overflow: hidden; background: #0a0a0f; }
  body {
    font-family: 'Inter', sans-serif;
    color: #f0f0f5;
    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 72px 88px;
  }
  /* subtle indigo->pink glow top-right */
  body::before {
    content: "";
    position: absolute;
    inset: -200px -200px auto auto;
    width: 900px;
    height: 900px;
    background: radial-gradient(circle at 70% 30%, rgba(139,92,246,0.28), rgba(236,72,153,0.12) 40%, transparent 65%);
    filter: blur(40px);
    pointer-events: none;
  }
  /* crosshair grid hint, bottom-left */
  body::after {
    content: "";
    position: absolute;
    inset: auto auto -300px -300px;
    width: 700px;
    height: 700px;
    background: radial-gradient(circle, rgba(99,102,241,0.18), transparent 60%);
    filter: blur(50px);
    pointer-events: none;
  }

  .kicker {
    font-family: 'Inter', sans-serif;
    font-size: 18px;
    font-weight: 500;
    letter-spacing: 0.26em;
    text-transform: uppercase;
    color: #9090a7;
    margin-bottom: 36px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .kicker .dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: linear-gradient(135deg, #6366f1, #ec4899);
    box-shadow: 0 0 18px rgba(139,92,246,0.7);
  }

  .wordmark {
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-size: 248px;
    line-height: 0.92;
    letter-spacing: -0.03em;
    background: linear-gradient(135deg, #f0f0f5 0%, #c4b5fd 45%, #f472b6 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    color: transparent;
    position: relative;
  }

  .underline {
    width: 220px;
    height: 5px;
    margin-top: 26px;
    background: linear-gradient(90deg, #6366f1 0%, #8b5cf6 55%, #ec4899 100%);
    border-radius: 2px;
  }

  .tagline {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-weight: 400;
    font-size: 40px;
    line-height: 1.2;
    color: #f0f0f5;
    margin-top: 28px;
    opacity: 0.94;
  }
  .tagline em {
    font-style: italic;
    color: #c4b5fd;
  }

  .meta-row {
    position: absolute;
    bottom: 56px;
    left: 88px;
    right: 88px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: 'Inter', sans-serif;
    font-size: 20px;
    font-weight: 500;
    color: #9090a7;
    letter-spacing: 0.04em;
  }
  .meta-row .url {
    color: #f0f0f5;
    font-weight: 500;
  }

  /* crosshair corners */
  .ch { position: absolute; width: 28px; height: 28px; pointer-events: none; }
  .ch::before, .ch::after {
    content: "";
    position: absolute;
    background: rgba(240,240,245,0.26);
  }
  .ch::before { top: 50%; left: 0; right: 0; height: 1px; transform: translateY(-50%); }
  .ch::after  { left: 50%; top: 0; bottom: 0; width: 1px; transform: translateX(-50%); }
  .ch.tl { top: 32px; left: 32px; }
  .ch.tr { top: 32px; right: 32px; }
  .ch.bl { bottom: 32px; left: 32px; }
  .ch.br { bottom: 32px; right: 32px; }
</style>
</head>
<body>
  <span class="ch tl"></span>
  <span class="ch tr"></span>
  <span class="ch bl"></span>
  <span class="ch br"></span>

  <div class="kicker"><span class="dot"></span>Mumbai · Est. 2026</div>
  <div class="wordmark">RMKAAV</div>
  <div class="underline"></div>
  <div class="tagline">Studio of Craft — <em>brand, automation, web.</em></div>
  <div class="meta-row">
    <span>Studio №01</span>
    <span class="url">rmkaav.com</span>
  </div>
</body>
</html>
